name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:

# Dummy values so the build/typecheck don't fail on missing env at module load.
# Real secrets live in the deployment platform, never in CI.
env:
  DATABASE_URL: "postgresql://user:password@localhost:5432/gulel_ott"
  NEXT_PUBLIC_SUPABASE_URL: "https://example.supabase.co"
  NEXT_PUBLIC_SUPABASE_ANON_KEY: "ci-dummy-anon-key"
  SUPABASE_SERVICE_ROLE_KEY: "ci-dummy-service-role-key"
  JWT_SECRET: "ci-jwt-secret-minimum-32-characters-long-xxxxx"
  NEXT_PUBLIC_APP_URL: "http://localhost:3000"
  NEXT_PUBLIC_APP_NAME: "Gulel OTT"

jobs:
  web:
    name: Web (lint · typecheck · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck (web)
        run: npx tsc --noEmit
      - name: Typecheck (@gulel/shared)
        run: npm run typecheck --workspace @gulel/shared
      - name: Build
        run: npm run build

  mobile:
    name: Mobile (typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install mobile deps
        run: npm ci
        working-directory: mobile
      - name: Typecheck (mobile)
        run: npx tsc --noEmit
        working-directory: mobile

  e2e:
    name: E2E (Playwright smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Run E2E
        run: npm run test:e2e
